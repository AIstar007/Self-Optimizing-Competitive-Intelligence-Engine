apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ci-engine-network-policy
  namespace: competitive-intelligence
spec:
  podSelector:
    matchLabels:
      app: ci-engine
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ci-engine-ingress
  namespace: competitive-intelligence
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.competitive-intelligence.com
    secretName: ci-engine-tls
  rules:
  - host: api.competitive-intelligence.com
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: ci-engine-api
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: ci-engine-api
            port:
              number: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ci-engine-pdb
  namespace: competitive-intelligence
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ci-engine
      component: api
